name: Automated Weather Predictor (Python ML)

on:
  schedule:
    # Chạy mỗi 15 phút một lần — đồng bộ với chu kỳ MATLAB Analysis trên ThingSpeak
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Cho phép kích hoạt thủ công từ giao diện GitHub để test demo

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'ml_engine/requirements.txt'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ml_engine/requirements.txt

    - name: Train Machine Learning Model (Dynamic Learning)
      if: github.event_name == 'workflow_dispatch'
      run: |
        # Chạy train để sinh các file model .joblib mới nhất dựa trên thời tiết thực tế
        python ml_engine/train.py

    - name: Run Weather Prediction and Update ThingSpeak
      env:
        # Cấu hình biến môi trường lấy từ Secrets của Github Repo (nếu cấu hình)
        # Nếu không có Secrets, script sẽ tự động dùng giá trị mặc định đã khai báo trong code
        THINGSPEAK_CHANNEL_ID: ${{ secrets.THINGSPEAK_CHANNEL_ID }}
        THINGSPEAK_READ_KEY: ${{ secrets.THINGSPEAK_READ_KEY }}
        THINGSPEAK_WRITE_KEY: ${{ secrets.THINGSPEAK_WRITE_KEY }}
      run: |
        python ml_engine/predict_live.py

    - name: Commit and Push Updated Models & Database
      if: github.event_name == 'workflow_dispatch'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add models/*.joblib data/sensor_warehouse.db || true
        git commit -m "chore(auto): update trained models and database [skip ci]" || true
        git push origin main || true

