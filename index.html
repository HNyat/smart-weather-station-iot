<!DOCTYPE html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AETHER STATION - Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "air-quality-green": "#00FF94",
              "on-tertiary-container": "#907760",
              "secondary-container": "#00f1fe",
              "on-secondary-fixed": "#002022",
              "on-secondary-container": "#006a70",
              "on-tertiary-fixed-variant": "#58432f",
              "error-container": "#93000a",
              "outline": "#909097",
              "on-tertiary-fixed": "#281807",
              "tertiary": "#dfc1a7",
              "glass-border": "rgba(255, 255, 255, 0.12)",
              "glass-fill": "rgba(255, 255, 255, 0.03)",
              "surface": "#131314",
              "on-surface-variant": "#c7c6cd",
              "tertiary-fixed-dim": "#dfc1a7",
              "surface-bright": "#39393a",
              "tertiary-container": "#1a0c01",
              "secondary-fixed": "#74f5ff",
              "surface-tint": "#c2c6db",
              "on-secondary": "#00363a",
              "outline-variant": "#46464c",
              "temp-orange": "#FF8C00",
              "on-background": "#e5e2e3",
              "on-primary-container": "#777b8e",
              "primary": "#c2c6db",
              "on-tertiary": "#3f2d1a",
              "on-primary-fixed": "#161b2b",
              "surface-container": "#201f21",
              "inverse-on-surface": "#313031",
              "secondary-fixed-dim": "#00dbe7",
              "surface-container-lowest": "#0e0e0f",
              "primary-fixed": "#dee1f7",
              "inverse-primary": "#595e70",
              "tertiary-fixed": "#fdddc1",
              "inverse-surface": "#e5e2e3",
              "error": "#ffb4ab",
              "surface-variant": "#353436",
              "surface-container-low": "#1c1b1d",
              "surface-dim": "#131314",
              "on-secondary-fixed-variant": "#004f54",
              "on-error": "#690005",
              "primary-fixed-dim": "#c2c6db",
              "humidity-cyan": "#00F2FF",
              "on-primary": "#2b3040",
              "on-error-container": "#ffdad6",
              "background": "#131314",
              "primary-container": "#0a0f1e",
              "on-surface": "#e5e2e3",
              "surface-container-highest": "#353436",
              "surface-container-high": "#2a2a2b",
              "secondary": "#ddfcff",
              "warning-red": "#FF3131",
              "on-primary-fixed-variant": "#414658"
            },
            "borderRadius": {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            "spacing": {
              "element-gap": "0.75rem",
              "bento-gap": "1.5rem",
              "grid-margin": "2rem",
              "container-padding": "1.5rem"
            },
            "fontFamily": {
              "headline-sm": ["Sora", "sans-serif"],
              "body-lg": ["Inter", "sans-serif"],
              "data-mono": ["Sora", "sans-serif"],
              "display-lg": ["Sora", "sans-serif"],
              "label-caps": ["Inter", "sans-serif"],
              "body-md": ["Inter", "sans-serif"],
              "headline-md": ["Sora", "sans-serif"]
            },
            "fontSize": {
              "headline-sm": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],
              "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
              "data-mono": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
              "display-lg": ["64px", { "lineHeight": "72px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
              "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "700" }],
              "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
              "headline-md": ["32px", { "lineHeight": "40px", "fontWeight": "600" }]
            }
          },
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        .glass-card {
          @apply bg-glass-fill border border-glass-border backdrop-blur-[20px] rounded-xl;
        }
        .neon-glow-temp {
          filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.3));
        }
        .neon-glow-green {
          filter: drop-shadow(0 0 15px rgba(0, 255, 148, 0.3));
        }
        .neon-glow-cyan {
          filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3));
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
